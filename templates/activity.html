<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Log</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root { --navy: #1a2a6c; --gold: #ffc107; }
        .navbar { background: var(--navy); border-bottom: 4px solid var(--gold); }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark p-3 mb-4 shadow">
        <div class="container d-flex justify-content-between">
            <h4 class="text-white mb-0 fw-bold">ASSET ACTIVITY</h4>
            <div>
                <a href="/" class="btn btn-warning fw-bold me-2">Dashboard</a>
                {% if session.role == 'Admin' %}
                <a href="/admin" class="btn btn-outline-warning fw-bold me-2">Admin</a>
                {% endif %}
                <a href="/logout" class="btn btn-danger fw-bold">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="card shadow border-0 rounded-4 overflow-hidden">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>User</th>
                        <th>Action</th>
                        <th>Asset S/N</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr>
                        <td>{{ log.user_email }}</td>
                        <td>{{ log.action }}</td>
                        <td><code>{{ log.asset_serial or '-' }}</code></td>
                        <td class="text-muted">{{ log.created_at }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="text-center text-muted py-4">No activity yet.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
