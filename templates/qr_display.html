<!DOCTYPE html>
<html>
<head>
    <title>Asset QR Code</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card p-5 shadow text-center" style="max-width: 420px;">
        <h4 class="fw-bold mb-2">Asset QR</h4>
        <p class="text-muted small mb-3">S/N: <strong>{{ asset.serial_number }}</strong></p>
        <img src="data:image/png;base64,{{ qr_code }}" class="img-fluid border mb-4" alt="QR">
        <p class="text-muted small">Scan to open asset details.</p>
        <button type="button" onclick="window.print()" class="btn btn-primary w-100 mb-2">Print</button>
        <a href="/" class="btn btn-outline-secondary w-100">Dashboard</a>
    </div>
</body>
</html>
